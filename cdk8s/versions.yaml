# Per-component image pins, keyed by env then image name.
#
# Envs/components listed here deploy the pinned release tag (rollback = git
# revert the bump commit). Anything absent floats on EnvConfig.image_tag
# (main on stage, latest on local) with imagePullPolicy: Always.
#
# Tags are the un-suffixed multi-arch manifest tags from release.yml — no `v`
# prefix (3.4.1, not v3.4.1). The prod-1 pin is bumped automatically by
# release-please at release time (the x-release-please-version marker anchors
# the replace); the release PR re-synths cdk8s/dist to match. Don't hand-edit
# unless rolling back.
prod-1:
  # restarting takes the stream down until OBS reconnects — pick a quiet moment
  obs: "1.0.4" # x-release-please-version
