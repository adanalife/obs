apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app: obs-twitch
    app.kubernetes.io/instance: obs-twitch
    app.kubernetes.io/name: obs
    app.kubernetes.io/part-of: tripbot
  name: obs-twitch-config
  namespace: default
data:
  DASHCAM_RTSP_URL: rtsp://mediamtx-twitch:8554/dashcam
  ONSCREENS_URL_BASE: http://onscreens-twitch:8080
  OBS_WEBSOCKET_PASSWD: adanalife
  OBS_QUALITY_PRESET: low
  OBS_STREAM_ENCODER: obs_x264
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: obs-twitch
    app.kubernetes.io/instance: obs-twitch
    app.kubernetes.io/name: obs
    app.kubernetes.io/part-of: tripbot
  name: obs-twitch
  namespace: default
spec:
  replicas: 0
  selector:
    matchLabels:
      app: obs-twitch
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: obs-twitch
        app.kubernetes.io/name: obs
        app.kubernetes.io/instance: obs-twitch
        app.kubernetes.io/part-of: tripbot
      annotations:
        adanalife.dev/config-hash: 471dda3c73
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: obs
          image: ghcr.io/adanalife/obs:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: vnc
              containerPort: 5900
            - name: websocket
              containerPort: 4455
            - name: novnc
              containerPort: 6080
            - name: obs-server
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: obs-twitch-config
            - secretRef:
                name: obs-stream-key
                optional: true
          livenessProbe:
            exec:
              command:
                - /opt/obs/healthcheck.sh
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 3Gi
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: obs-twitch
    app.kubernetes.io/instance: obs-twitch
    app.kubernetes.io/name: obs
    app.kubernetes.io/part-of: tripbot
  name: obs-twitch
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: obs-twitch
  ports:
    - name: vnc
      port: 5900
      targetPort: vnc
    - name: websocket
      port: 4455
      targetPort: websocket
    - name: novnc
      port: 6080
      targetPort: novnc
    - name: obs-server
      port: 8080
      targetPort: obs-server
---
apiVersion: v1
kind: Service
metadata:
  name: obs-twitch-host
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: obs-twitch
  ports:
    - name: vnc
      port: 5902
      targetPort: vnc
