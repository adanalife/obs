apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app: obs-twitch
    app.kubernetes.io/instance: obs-twitch
    app.kubernetes.io/name: obs
    app.kubernetes.io/part-of: tripbot
  name: obs-twitch-config
  namespace: stage-1
data:
  DASHCAM_RTSP_URL: rtsp://mediamtx-twitch:8554/dashcam
  ONSCREENS_URL_BASE: http://onscreens-twitch:8080
  OBS_WEBSOCKET_PASSWD: adanalife
  OBS_QUALITY_PRESET: high
  OBS_STREAM_ENCODER: ffmpeg_vaapi_tex
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: obs-twitch
    app.kubernetes.io/instance: obs-twitch
    app.kubernetes.io/name: obs
    app.kubernetes.io/part-of: tripbot
  name: obs-twitch
  namespace: stage-1
spec:
  selector:
    matchLabels:
      app: obs-twitch
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: obs-twitch
        app.kubernetes.io/name: obs
        app.kubernetes.io/instance: obs-twitch
        app.kubernetes.io/part-of: tripbot
      annotations:
        adanalife.dev/config-hash: 4609bcb0af
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: obs
          image: ghcr.io/adanalife/obs:main
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: vnc
              containerPort: 5900
            - name: websocket
              containerPort: 4455
            - name: novnc
              containerPort: 6080
            - name: obs-server
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: obs-twitch-config
            - secretRef:
                name: obs-stream-key
                optional: true
          livenessProbe:
            exec:
              command:
                - /opt/obs/healthcheck.sh
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
              gpu.intel.com/i915: "1"
            limits:
              memory: 3Gi
              gpu.intel.com/i915: "1"
  replicas: 0
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: obs-twitch
    app.kubernetes.io/instance: obs-twitch
    app.kubernetes.io/name: obs
    app.kubernetes.io/part-of: tripbot
  name: obs-twitch
  namespace: stage-1
spec:
  type: ClusterIP
  selector:
    app: obs-twitch
  ports:
    - name: vnc
      port: 5900
      targetPort: vnc
    - name: websocket
      port: 4455
      targetPort: websocket
    - name: novnc
      port: 6080
      targetPort: novnc
    - name: obs-server
      port: 8080
      targetPort: obs-server
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/issuer: letsencrypt-route53
    external-dns.alpha.kubernetes.io/hostname: obs-twitch.stage.whereisdana.today
  name: obs-twitch
  namespace: stage-1
spec:
  ingressClassName: traefik
  rules:
    - host: obs-twitch.stage.whereisdana.today
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: obs-twitch
                port:
                  name: novnc
  tls:
    - hosts:
        - obs-twitch.stage.whereisdana.today
      secretName: obs-twitch-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: obs-twitch-ts
  namespace: stage-1
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: obs-twitch
      port:
        number: 6080
  tls:
    - hosts:
        - obs-twitch-stage
