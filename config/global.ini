[General]
; obs-browser advertises the GL shared-texture path to CEF, which then
; renders browser sources into a texture OBS samples directly — no
; CPU readback per frame. The shared-texture handoff needs both ends
; on a real GL device: with OBS's GL on Mesa llvmpipe (CPU rasterizer),
; CEF's shared-texture OnPaint callback early-returns under
; sharing_available and drops every frame. With OBS on the Intel iris
; driver (EGL + Wayland) the handoff completes end-to-end on the iGPU's
; DRM-PRIME ring, the same buffer-sharing fabric VAAPI's _tex encoder
; uses.
;
; OBS 32 reads BrowserHWAccel from appConfig (global.ini), not userConfig
; (user.ini), so this is the only place the setting actually takes effect.
BrowserHWAccel=true
