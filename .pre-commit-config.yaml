# Install both the pre-commit (file-content) hooks and the commit-msg hook
# (the Conventional Commits check at the bottom) on a plain `pre-commit install`.
default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Git style
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-vcs-permalinks
      - id: forbid-new-submodules
      - id: no-commit-to-branch

      # Common errors
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-executables-have-shebangs

      # Cross platform
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

      # Security
      - id: detect-aws-credentials
        args: ['--allow-missing-credentials']
      - id: detect-private-key

  # Secrets: broad scan layered on top of the narrow detect-aws-credentials
  # / detect-private-key checks above. Sub-second.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # GitHub Actions workflow linting.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Markdown linting — reads .github/linters/.markdown-lint.yml. The towncrier
  # Jinja template is named .md but isn't valid markdown, so it's excluded.
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.0
    hooks:
      - id: markdownlint
        language_version: lts
        args: [--config, .github/linters/.markdown-lint.yml]
        exclude: '^\.github/towncrier-template\.md$'

  # Python: ruff handles both lint and format (the cdk8s/ deploy-authoring layer
  # is the only Python in the repo).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # Conventional Commits — enforce `type(scope): summary` on commit messages so
  # history stays machine-parseable: it feeds the towncrier changelog fragments,
  # underpins release automation, and gives every contributor/agent the same
  # commit grammar without re-explaining it. Runs at the commit-msg stage;
  # default_install_hook_types (top of file) wires it up on `pre-commit install`.
  # Guards LOCAL commits — and since develop PRs squash-merge, the PR *title*
  # becomes the squash subject, so keep PR titles conventional too.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: changelog-fragment
        name: changelog fragment (towncrier)
        entry: scripts/check-changelog-fragment.sh
        language: script
        stages: [pre-push]
        pass_filenames: false
        always_run: true
