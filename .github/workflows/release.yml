# Tag-triggered release: multi-arch (amd64 + arm64) OBS image pushed to GHCR.
# The package is PUBLIC (this repo is public, the image carries no secrets), so
# cluster + CI pulls are anonymous — no imagePullSecret. GITHUB_TOKEN can push
# packages in the same repo, so no extra secret is needed.
#
# Built matrix-on-native-runners (tripbot's pattern): each arch builds on its own
# native GitHub-hosted runner — no QEMU. amd64 uses Dockerfile (OBS from the
# obsproject PPA) on ubuntu-latest; arm64 uses Dockerfile.arm64 (OBS from source,
# COPYing out of the pre-baked ghcr.io/adanalife/obs-cef-base — rebuilt separately
# by obs-base.yml) on ubuntu-24.04-arm; a manifest job stitches the per-arch tags
# into the multi-arch list.
#
# NOTE: prod runs OBS on the amd64 minipc today; the arm64 image is built for
# parity and is ready if OBS ever lands on an arm64 node.
name: Release
on:
  push:
    tags:
      - v*
  # release-please.yml dispatches this at the tag it just created — a
  # GITHUB_TOKEN-created tag can't fire the push trigger above.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            dockerfile: Dockerfile
          - arch: arm64
            runner: ubuntu-24.04-arm
            dockerfile: Dockerfile.arm64
    steps:
      - uses: actions/checkout@v7

      - name: Resolve bare version
        id: ver
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Per-arch tags get a -<arch> suffix so the manifest job can combine them
      # into a multi-arch list under the un-suffixed tag. onlatest=true applies
      # the suffix to the `latest` tag too, so each arch publishes latest-<arch>
      # — the manifest job (also latest=true) stitches the un-suffixed :latest
      # from them. Without onlatest=true the suffix skips `latest` (each leg pushes
      # a bare single-arch :latest and no latest-<arch>), so the manifest step dies
      # on `latest-amd64: not found`.
      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/adanalife/obs
          flavor: |
            latest=true
            suffix=-${{ matrix.arch }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          load: true
          build-args: |
            VERSION=${{ steps.ver.outputs.value }}
            SHA=${{ github.sha }}
          cache-from: type=gha,scope=obs-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=obs-${{ matrix.arch }}

      - name: Verify version stamping
        run: |
          IMAGE="ghcr.io/adanalife/obs:${{ steps.ver.outputs.value }}-${{ matrix.arch }}"
          echo "version: $(docker run --rm --entrypoint cat "$IMAGE" /etc/tripbot/version)"
          echo "sha:     $(docker run --rm --entrypoint cat "$IMAGE" /etc/tripbot/sha)"
          test "$(docker run --rm --entrypoint cat "$IMAGE" /etc/tripbot/version)" = "${{ steps.ver.outputs.value }}"
          test "$(docker run --rm --entrypoint cat "$IMAGE" /etc/tripbot/sha)" = "${{ github.sha }}"

  manifest:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/adanalife/obs
          flavor: latest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Create multi-arch manifest lists
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "==> $tag = $tag-amd64 + $tag-arm64"
            docker buildx imagetools create -t "$tag" "$tag-amd64" "$tag-arm64"
          done <<< "${{ steps.meta.outputs.tags }}"

  # The GitHub Release is created by release-please when the release PR merges;
  # this workflow only builds the image + notifies.
  notify:
    needs: manifest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Discord notification
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION_TAG: ${{ github.ref_name }}
        with:
          args: 'New Docker image released for [{{ EVENT_PAYLOAD.repository.full_name }}]({{ EVENT_PAYLOAD.repository.html_url }}): [{{ VERSION_TAG }}]({{ EVENT_PAYLOAD.compare }})'
