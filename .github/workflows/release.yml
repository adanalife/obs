# Tag-triggered release: multi-arch (amd64 + arm64) OBS image pushed to GHCR.
# The package is PUBLIC (this repo is public, the image carries no secrets), so
# cluster + CI pulls are anonymous — no imagePullSecret. GITHUB_TOKEN can push
# packages in the same repo, so no extra secret is needed.
#
# Built matrix-on-native-runners (tripbot's pattern): each arch builds on its own
# native runner — no QEMU. amd64 uses Dockerfile (OBS from the obsproject PPA);
# arm64 uses Dockerfile.arm64 (OBS from source, COPYing out of the pre-baked
# ghcr.io/adanalife/obs-cef-base — rebuilt separately by obs-base.yml). The arm64
# leg routes to the org-level self-hosted rpi5 runner (arc-arm64-tripbot) when
# online, else GitHub-hosted ubuntu-24.04-arm; a manifest job stitches the
# per-arch tags into the multi-arch list.
#
# NOTE: prod runs OBS on the amd64 minipc today; the arm64 image is built for
# parity and is ready if OBS ever lands on an arm64 node.
name: Release
on:
  push:
    tags:
      - v*
  # auto-tag.yml dispatches this at the tag it just pushed — a GITHUB_TOKEN-
  # pushed tag can't fire the push trigger above.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  pick-runner:
    runs-on: ubuntu-latest
    outputs:
      arm64_runner: ${{ steps.pick.outputs.arm64_runner }}
    steps:
      - name: Mint ARC GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.ARC_APP_ID }}
          private-key: ${{ secrets.ARC_APP_PRIVATE_KEY }}
      - name: Pick arm64 runner (self-hosted if online, else GitHub-hosted)
        id: pick
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # ARC scale-set runners route by scale-set NAME and report empty
          # .labels via this API, so match on the runner name prefix.
          online=$(gh api "orgs/${{ github.repository_owner }}/actions/runners" \
            --jq 'any(.runners[]; .status=="online" and (.name|startswith("arc-arm64-tripbot")))')
          if [ "$online" = "true" ]; then
            echo "arm64_runner=arc-arm64-tripbot" >> "$GITHUB_OUTPUT"
            echo "::notice::arm64 leg → self-hosted rpi5 runner (arc-arm64-tripbot)"
          else
            echo "arm64_runner=ubuntu-24.04-arm" >> "$GITHUB_OUTPUT"
            echo "::notice::arm64 leg → GitHub-hosted (rpi5 runner offline)"
          fi

  build:
    needs: pick-runner
    name: build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            dockerfile: Dockerfile
          - arch: arm64
            runner: ${{ needs.pick-runner.outputs.arm64_runner }}
            dockerfile: Dockerfile.arm64
    steps:
      - uses: actions/checkout@v7

      - name: Resolve bare version
        id: ver
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Per-arch tags get a -<arch> suffix so the manifest job can combine them
      # into a multi-arch list under the un-suffixed tag.
      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/adanalife/obs
          flavor: |
            latest=false
            suffix=-${{ matrix.arch }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          load: true
          build-args: |
            VERSION=${{ steps.ver.outputs.value }}
            SHA=${{ github.sha }}
          cache-from: type=gha,scope=obs-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=obs-${{ matrix.arch }}

      - name: Verify version stamping
        run: |
          IMAGE="ghcr.io/adanalife/obs:${{ steps.ver.outputs.value }}-${{ matrix.arch }}"
          echo "version: $(docker run --rm --entrypoint cat "$IMAGE" /etc/tripbot/version)"
          echo "sha:     $(docker run --rm --entrypoint cat "$IMAGE" /etc/tripbot/sha)"
          test "$(docker run --rm --entrypoint cat "$IMAGE" /etc/tripbot/version)" = "${{ steps.ver.outputs.value }}"
          test "$(docker run --rm --entrypoint cat "$IMAGE" /etc/tripbot/sha)" = "${{ github.sha }}"

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/adanalife/obs
          flavor: latest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Create multi-arch manifest lists
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "==> $tag = $tag-amd64 + $tag-arm64"
            docker buildx imagetools create -t "$tag" "$tag-amd64" "$tag-arm64"
          done <<< "${{ steps.meta.outputs.tags }}"

  github-release:
    needs: manifest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" --generate-notes --verify-tag
