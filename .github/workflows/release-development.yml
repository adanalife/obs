# Floating :develop image on every develop push — what stage-1 deploys
# (imagePullPolicy: Always picks up rebuilds under the tag). amd64-only: prod and
# stage both run OBS on the amd64 minipc, so the arm64 image is only built at
# tagged releases (release.yml), not on every develop push.
name: release-development
on:
  push:
    branches:
      - develop

# Only build the newest develop merge. Cancel an in-flight build when a newer
# develop push arrives — :develop should track HEAD.
concurrency:
  group: release-development
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          tags: ghcr.io/adanalife/obs:develop
          push: true
          build-args: |
            VERSION=develop-${{ github.sha }}
            SHA=${{ github.sha }}
          cache-from: type=gha,scope=obs-amd64
          cache-to: type=gha,mode=max,scope=obs-amd64
