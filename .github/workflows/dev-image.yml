# Floating :main image on every main push — what stage-1 deploys
# (imagePullPolicy: Always picks up rebuilds under the tag). amd64-only: prod and
# stage both run OBS on the amd64 minipc, so the arm64 image is only built at
# tagged releases (release.yml), not on every main push.
name: dev-image
on:
  push:
    branches:
      - main

# Only build the newest main merge. Cancel an in-flight build when a newer
# main push arrives — :main should track HEAD.
concurrency:
  group: dev-image
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          tags: ghcr.io/adanalife/obs:main
          push: true
          build-args: |
            VERSION=main-${{ github.sha }}
            SHA=${{ github.sha }}
          cache-from: type=gha,scope=obs-amd64
          cache-to: type=gha,mode=max,scope=obs-amd64
