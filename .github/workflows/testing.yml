# PR + branch smoke test: build the amd64 image and prove it boots to a healthy
# state with no STREAM_KEY. Standalone (no docker-compose) — the OBS container
# doesn't need VLC to start or pass its healthcheck: the healthcheck only checks
# the OBS process, the Wayland session, and the absence of the safe-mode crash
# modal. Browser/RTSP sources retry on missing peers without crashing OBS.
#
# arm64 isn't built here — its from-source compile is slow and only changes when
# the OBS/CEF version bumps; release.yml covers the arm64 build at tag time, and
# obs-base.yml rebuilds the CEF base when it changes.
name: testing
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build OBS image (amd64, cached)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          tags: obs:ci
          load: true
          cache-from: type=gha,scope=obs-amd64
          cache-to: type=gha,mode=max,scope=obs-amd64

      - name: Run OBS (no STREAM_KEY)
        run: docker run -d --name obs-ci obs:ci

      - name: Wait for healthcheck
        run: |
          for i in $(seq 1 30); do
            state=$(docker inspect -f '{{.State.Health.Status}}' obs-ci)
            echo "OBS health: $state ($i/30)"
            [ "$state" = "healthy" ] && exit 0
            sleep 2
          done
          echo "OBS failed to become healthy" >&2
          exit 1

      - name: Verify version files baked into image
        run: |
          docker exec obs-ci test -s /etc/tripbot/version
          docker exec obs-ci test -s /etc/tripbot/sha

      - name: Container logs
        if: always()
        run: docker logs obs-ci

      - name: Tear down
        if: always()
        continue-on-error: true
        run: docker rm -f obs-ci
